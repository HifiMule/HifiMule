<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HifiMule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script type="module" src="/src/main.ts" defer></script>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --bg-dark: #0f172a;
            --text: #f1f5f9;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .splash-container {
            width: 360px;
            height: 460px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo {
            width: 160px;
            height: 160px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px var(--primary-glow));
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: var(--text);
            letter-spacing: -0.025em;
        }

        .status-container {
            margin-top: auto;
            width: 100%;
        }

        #status-text {
            font-size: 14px;
            color: rgba(241, 245, 249, 0.7);
            margin-bottom: 20px;
            min-height: 20px;
        }

        .loader {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loader-bar {
            width: 40%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            position: absolute;
            animation: loading 2s infinite ease-in-out;
        }

        @keyframes loading {
            0% {
                left: -40%;
            }

            100% {
                left: 100%;
            }
        }

        .error-ui {
            display: none;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: 20px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .error #status-text {
            color: #ef4444;
        }

        .error .loader {
            display: none;
        }

        .error .error-ui {
            display: flex;
        }
    </style>
</head>

<body>
    <div class="splash-container" id="container">
        <img src="/src/assets/logo.png" alt="HifiMule Logo" class="logo">
        <h1>HifiMule</h1>

        <div class="status-container">
            <div id="status-text">Initializing Hub...</div>
            <div class="loader">
                <div class="loader-bar"></div>
            </div>

            <div class="error-ui">
                <button id="retry-btn">Retry Connection</button>
                <button id="settings-btn" class="secondary">Open Settings</button>
            </div>
        </div>
    </div>

    <script>
        // These will be wired up by the main process or frontend coordinator
        document.getElementById('retry-btn').onclick = () => window.location.reload();
        document.getElementById('settings-btn').onclick = () => {
            // Logic handled via main process
        };
    </script>
</body>

</html>

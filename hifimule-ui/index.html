<!doctype html>
<html lang="en" class="sl-theme-dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HifiMule Hub</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.0/cdn/themes/dark.css" />
  <script type="module"
    src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.19.0/cdn/shoelace-autoloader.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/src/styles.css" />
  <script type="module" src="/src/main.ts" defer></script>

  <style>
    body.ready {
      opacity: 1;
      transition: opacity 0.5s ease;
    }
  </style>
</head>

<body class="sl-theme-dark">
  <div class="app-container">
    <sl-split-panel position="70" class="split-panel">
      <div slot="start" class="library-view">
        <header>
          <h1>Library</h1>
          <p>Select media to sync to your device.</p>
        </header>

        <div id="library-content" class="content">
          <!-- Media grid will be rendered here by library.ts -->
        </div>
      </div>

      <div slot="end" class="basket-view">
        <h2>Basket</h2>
        <p>Ready to sync</p>

        <div class="basket-placeholder">
          <sl-icon name="basket" style="font-size: 2rem; opacity: 0.5;"></sl-icon>
          <p style="opacity: 0.5;">Your basket is empty</p>
        </div>

        <div style="margin-top: auto;">
          <sl-button variant="primary" style="width: 100%;" disabled>
            <sl-icon slot="prefix" name="cloud-download"></sl-icon>
            Start Sync
          </sl-button>
        </div>
      </div>
    </sl-split-panel>
  </div>

  <script>
    // document.addEventListener('DOMContentLoaded', () => {
    //   document.body.classList.add('ready');
    // });
  </script>
</body>

</html>

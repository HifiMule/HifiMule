name: Smoke Test

# MTP end-to-end detection requires manual hardware verification on each platform. Automated MTP IO coverage is provided by unit tests in device_io.rs.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to test (e.g. v0.1.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download MSI artifact
        run: gh release download ${{ github.event.inputs.release_tag }} --pattern "*.msi" --dir ./installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke test
        working-directory: ./installers
        shell: pwsh
        run: |
          & powershell -ExecutionPolicy Bypass -File ../scripts/smoke-tests/smoke-windows.ps1 2>&1 |
            Tee-Object smoke.log
          exit $LASTEXITCODE

      - name: Upload smoke test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log-windows
          path: ./installers/smoke.log
          if-no-files-found: ignore

  smoke-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libwebkit2gtk-4.1-0 libappindicator3-1

      - name: Download .deb artifact
        run: gh release download ${{ github.event.inputs.release_tag }} --pattern "*.deb" --dir ./installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke test
        working-directory: ./installers
        shell: bash
        run: |
          set -o pipefail
          bash ../scripts/smoke-tests/smoke-linux.sh 2>&1 | tee smoke.log

      - name: Upload smoke test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log-linux
          path: ./installers/smoke.log
          if-no-files-found: ignore

  smoke-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download DMG artifact
        run: gh release download ${{ github.event.inputs.release_tag }} --pattern "*.dmg" --dir ./installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke test
        working-directory: ./installers
        shell: bash
        run: |
          set -o pipefail
          bash ../scripts/smoke-tests/smoke-macos.sh 2>&1 | tee smoke.log

      - name: Upload smoke test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log-macos
          path: ./installers/smoke.log
          if-no-files-found: ignore

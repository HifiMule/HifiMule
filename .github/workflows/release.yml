name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkgconf \
            libxdo-dev \
            libmtp-dev
          pkg-config --libs libmtp

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config libmtp
          LIBMTP_PREFIX="$(brew --prefix libmtp)"
          LIBMTP_PC_DIR="$LIBMTP_PREFIX/lib/pkgconfig"
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH_aarch64_apple_darwin=$LIBMTP_PC_DIR" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH_x86_64_apple_darwin=$LIBMTP_PC_DIR" >> "$GITHUB_ENV"
          pkg-config --libs libmtp
          LIBMTP_DYLIB="$(find "$LIBMTP_PREFIX/lib" -name 'libmtp*.dylib' -print -quit)"
          test -n "$LIBMTP_DYLIB"
          lipo -verify_arch arm64 "$LIBMTP_DYLIB"
          lipo -verify_arch x86_64 "$LIBMTP_DYLIB"

      - name: Install frontend dependencies
        working-directory: jellyfinsync-ui
        run: pnpm install

      # macOS universal build: cross-compile daemon for both architectures and stage both sidecars.
      # prepare-sidecar.mjs only handles the host target, so we do this explicitly here.
      # Tauri's universal build checks arch-specific sidecars during each compilation slice,
      # then expects the universal-merged binary during bundling — all three must be present.
      - name: Stage daemon sidecars (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --release -p jellyfinsync-daemon --target aarch64-apple-darwin
          cargo build --release -p jellyfinsync-daemon --target x86_64-apple-darwin
          mkdir -p jellyfinsync-ui/src-tauri/sidecars
          cp target/aarch64-apple-darwin/release/jellyfinsync-daemon \
             jellyfinsync-ui/src-tauri/sidecars/jellyfinsync-daemon-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/jellyfinsync-daemon \
             jellyfinsync-ui/src-tauri/sidecars/jellyfinsync-daemon-x86_64-apple-darwin
          lipo -create -output \
            jellyfinsync-ui/src-tauri/sidecars/jellyfinsync-daemon-universal-apple-darwin \
            target/aarch64-apple-darwin/release/jellyfinsync-daemon \
            target/x86_64-apple-darwin/release/jellyfinsync-daemon

      - name: Stage daemon sidecar
        if: matrix.platform != 'macos-latest'
        run: node scripts/prepare-sidecar.mjs

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'JellyfinSync ${{ github.ref_name }}'
          releaseBody: 'See the release notes for details.'
          releaseDraft: true
          prerelease: false
          projectPath: jellyfinsync-ui
          args: ${{ matrix.args }}

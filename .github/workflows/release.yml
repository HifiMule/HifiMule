name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust-targets: ''
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        # action-v4.0.0 (latest reviewed for this hardening pass)
        uses: pnpm/action-setup@v4.0.0
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkgconf \
            libxdo-dev \
            libmtp-dev
          pkg-config --libs libmtp
          test -e /usr/lib/x86_64-linux-gnu/libmtp.so.9

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          brew install pkg-config libmtp
          LIBMTP_PREFIX="$(brew --prefix libmtp)"
          LIBMTP_PC_DIR="$LIBMTP_PREFIX/lib/pkgconfig"

          # The arm64 runner only provides arm64 bottles; the universal build also needs x86_64.
          # Fetch the x86_64 (sonoma) bottle and merge it with the installed arm64 dylib.
          brew fetch --force --bottle-tag=sonoma libmtp
          X86_BOTTLE="$(find "$(brew --cache)/downloads" -name '*libmtp*sonoma.bottle.tar.gz' | tail -1)"
          test -n "$X86_BOTTLE" || { echo "x86_64 sonoma bottle not found"; exit 1; }
          X86_DIR="$(mktemp -d)"
          tar -xzf "$X86_BOTTLE" -C "$X86_DIR"
          ARM64_DYLIB="$(find "$LIBMTP_PREFIX/lib" -name 'libmtp.*.dylib' ! -type l | head -1)"
          X86_DYLIB="$(find "$X86_DIR" -name 'libmtp.*.dylib' ! -type l | head -1)"
          test -n "$ARM64_DYLIB" || { echo "arm64 dylib not found"; exit 1; }
          test -n "$X86_DYLIB" || { echo "x86_64 dylib not found in bottle"; exit 1; }
          MERGED_DYLIB="$(mktemp)"
          lipo -create -output "$MERGED_DYLIB" "$ARM64_DYLIB" "$X86_DYLIB"
          chmod u+w "$ARM64_DYLIB"
          cp "$MERGED_DYLIB" "$ARM64_DYLIB"

          echo "PKG_CONFIG_ALLOW_CROSS=1" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH_aarch64_apple_darwin=$LIBMTP_PC_DIR" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH_x86_64_apple_darwin=$LIBMTP_PC_DIR" >> "$GITHUB_ENV"
          pkg-config --libs libmtp
          LIBMTP_DYLIB="$(find "$LIBMTP_PREFIX/lib" -name 'libmtp*.dylib' -print -quit)"
          test -n "$LIBMTP_DYLIB"
          lipo "$LIBMTP_DYLIB" -verify_arch arm64
          lipo "$LIBMTP_DYLIB" -verify_arch x86_64

      - name: Install frontend dependencies
        working-directory: hifimule-ui
        run: pnpm install

      # macOS universal build: cross-compile daemon for both architectures and stage both sidecars.
      # prepare-sidecar.mjs only handles the host target, so we do this explicitly here.
      # Tauri's universal build checks arch-specific sidecars during each compilation slice,
      # then expects the universal-merged binary during bundling — all three must be present.
      - name: Stage daemon sidecars (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          cargo build --release -p hifimule-daemon --target aarch64-apple-darwin
          cargo build --release -p hifimule-daemon --target x86_64-apple-darwin
          mkdir -p hifimule-ui/src-tauri/sidecars
          cp target/aarch64-apple-darwin/release/hifimule-daemon \
             hifimule-ui/src-tauri/sidecars/hifimule-daemon-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/hifimule-daemon \
             hifimule-ui/src-tauri/sidecars/hifimule-daemon-x86_64-apple-darwin
          lipo -create -output \
            hifimule-ui/src-tauri/sidecars/hifimule-daemon-universal-apple-darwin \
            target/aarch64-apple-darwin/release/hifimule-daemon \
            target/x86_64-apple-darwin/release/hifimule-daemon

      - name: Stage daemon sidecar
        if: matrix.platform != 'macos-latest'
        run: node scripts/prepare-sidecar.mjs

      - name: Bundle macOS libmtp dylibs
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          LIB_DIR="hifimule-ui/src-tauri/bundled-libs"
          mkdir -p "$LIB_DIR"
          LIBMTP_PREFIX="$(brew --prefix libmtp)"
          LIBMTP_DYLIB="$(find "$LIBMTP_PREFIX/lib" -name 'libmtp*.dylib' ! -type l -print -quit)"
          test -n "$LIBMTP_DYLIB" || { echo "libmtp dylib not found"; exit 1; }

          copy_brew_dylib() {
            local dylib="$1"
            local target="$LIB_DIR/$(basename "$dylib")"
            cp "$dylib" "$target"
            chmod u+w "$target"
            install_name_tool -id "@executable_path/../Resources/bundled-libs/$(basename "$target")" "$target" \
              || echo "Warning: install_name_tool -id failed for $(basename "$target")" >&2
            otool -L "$target" | awk '/\/opt\/homebrew|\/usr\/local/ { print $1 }' | while read -r dep; do
              if [[ -f "$dep" && ! -f "$LIB_DIR/$(basename "$dep")" ]]; then
                copy_brew_dylib "$dep"
              fi
            done
          }

          copy_brew_dylib "$LIBMTP_DYLIB"

          find "$LIB_DIR" -name '*.dylib' -print0 | while IFS= read -r -d '' dylib; do
            otool -L "$dylib" | awk '/\/opt\/homebrew|\/usr\/local/ { print $1 }' | while read -r dep; do
              dep_name="$(basename "$dep")"
              if [[ -f "$LIB_DIR/$dep_name" ]]; then
                install_name_tool -change "$dep" "@executable_path/../Resources/bundled-libs/$dep_name" "$dylib"
              fi
            done
          done

          find hifimule-ui/src-tauri/sidecars -type f -name 'hifimule-daemon-*apple-darwin' -print0 | while IFS= read -r -d '' sidecar; do
            otool -L "$sidecar" | awk '/libmtp.*\.dylib/ { print $1 }' | while read -r dep; do
              install_name_tool -change "$dep" "@executable_path/../Resources/bundled-libs/$(basename "$LIBMTP_DYLIB")" "$sidecar"
            done
            if otool -L "$sidecar" | grep -E '/opt/homebrew|/usr/local' | grep -q 'libmtp'; then
              echo "Homebrew libmtp path still present in $sidecar"
              otool -L "$sidecar"
              exit 1
            fi
          done

      - name: Check macOS minimum system version reminder
        if: matrix.platform == 'macos-latest'
        run: node scripts/check-macos-minimum-system-version.mjs

      - name: Build and release
        id: build_and_release
        # action-v0.6.2 (latest reviewed for this hardening pass)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HIFIMULE_SKIP_SIDECAR_PREP: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'HifiMule ${{ github.ref_name }}'
          releaseBody: 'See the release notes for details.'
          releaseDraft: true
          prerelease: false
          projectPath: hifimule-ui
          args: ${{ matrix.args }}

      - name: Verify Linux AppImage bundles libmtp
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          set -euo pipefail
          TARGET_DIRS=()
          for dir in target hifimule-ui/src-tauri/target; do
            if [[ -d "$dir" ]]; then
              TARGET_DIRS+=("$dir")
            fi
          done
          test "${#TARGET_DIRS[@]}" -gt 0 || { echo "No Tauri target directory found"; exit 1; }
          APPIMAGE="$(find "${TARGET_DIRS[@]}" -path '*/release/bundle/*' -name '*.AppImage' -print -quit)"
          test -n "$APPIMAGE" || { echo "AppImage artifact not found"; exit 1; }
          chmod +x "$APPIMAGE"
          rm -rf squashfs-root
          "$APPIMAGE" --appimage-extract >/dev/null
          if ! test -e squashfs-root/usr/lib/libmtp.so.9; then
            echo "Bundled libmtp.so.9 not found in extracted AppImage"
            find squashfs-root -name 'libmtp*' -print
            rm -rf squashfs-root
            exit 1
          fi
          rm -rf squashfs-root

      - name: Verify macOS bundle uses bundled libmtp
        if: matrix.platform == 'macos-latest'
        run: |
          set -euo pipefail
          TARGET_DIRS=()
          for dir in target hifimule-ui/src-tauri/target; do
            if [[ -d "$dir" ]]; then
              TARGET_DIRS+=("$dir")
            fi
          done
          test "${#TARGET_DIRS[@]}" -gt 0 || { echo "No Tauri target directory found"; exit 1; }
          APP_DIR="$(find "${TARGET_DIRS[@]}" -path '*.app' -type d -print -quit)"
          test -n "$APP_DIR" || { echo ".app bundle not found"; exit 1; }
          test -n "$(find "$APP_DIR/Contents/Resources/bundled-libs" -name 'libmtp*.dylib' -print -quit)" || {
            echo "Bundled libmtp dylib not found in app resources"
            exit 1
          }
          find "$APP_DIR/Contents/MacOS" -type f -name 'hifimule-daemon*' -print0 | while IFS= read -r -d '' sidecar; do
            if otool -L "$sidecar" | grep -E '/opt/homebrew|/usr/local' | grep -q 'libmtp'; then
              echo "Homebrew libmtp path still present in bundled sidecar: $sidecar"
              otool -L "$sidecar"
              exit 1
            fi
          done

  smoke-test:
    needs: release
    permissions:
      contents: write
    uses: ./.github/workflows/smoke-test.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit
